<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WELCOME || M.A.A.S COLLEGE</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* Header */
    .top-header {
      display: flex;
      align-items:center;
      background: #f8f9fa;
      padding: 15px;
    }
    .logo {
      height: 150px;
      margin-right: 80px;
    }
    .college-info {
      flex: 1; /* keeps info in the middle section */
    }
    .college-info h1 {
      margin: 0;
      color: #333;
    }
    .header-buttons {
      margin-left: auto;
    }
    .apply-btn {
      background: #ffc107;
      border: none;
      padding: 10px 15px;
      margin-left: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    /* Navigation */
    .navbar {
      background: #500454;
      align-items: center;
      display: flex;
      justify-content: space-between;
      padding: 10px;
    }
    .navbar ul {
      list-style: none;
      display: flex;
      margin: 0;
      padding: 0;
    }
    .navbar ul li {
      margin-right: 30px;
      position: relative;
    }
    .navbar ul li a {
      color: #fff;
      text-decoration: none;
      font-size: small;
      font-weight: bold;
    }

    /* Dropdown */
    .dropdown-content {
      display: none;
      position: absolute;
      background: #500454;
      min-width: 160px;
      box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.2);
      z-index: 1;
    }
    .dropdown-content a {
      color: #000000;
      padding: 10px;
      text-decoration: none;
      display: block;
    }
    .dropdown-content a:hover {
      background: #bcb308;
    }
    .navbar ul li:hover .dropdown-content {
      display: block;
    }

    .social-icons img {
      height: 20px;
      margin-left: 10px;
    }

    /* Banner */
    .banner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #e9ecef;
      padding: 40px;
    }
    .banner-text h2 {
      color: red;
      font-size: 28px;
    }
    .banner-text p {
      color: #007bff;
      font-size: 18px;
    }
    .know-more {
      background: #ffc107;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
    }
    .banner-image img {
      max-width: 400px;
    }

    /* Enquiry Tab */
    .enquiry-tab {
      position: fixed;
      right: 0;
      top: 50%;
      background: #ffc107;
      padding: 10px;
      transform: rotate(-90deg);
      cursor: pointer;
      font-weight: bold;
    }
     body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
    }

    /* Header */
    .top-header {
      display: flex;
      align-items: center;
      background: #f8f9fa;
      padding: 15px;
    }
    .logo {
      height: 120px;
      margin-right: 20px;
    }
    .college-info {
      flex: 1;
      text-align: center;
    }
    .college-info h1 {
      margin: 0;
      color: #333;
    }
    .college-info p {
      margin: 4px 0;
      color: #555;
    }
.programs-section{
    padding:80px 8%;
    background:#ffffff;
}

.sub-title{
    color:#173b86;
    font-size:32px;
    font-weight:300;
}

.main-title{
    color:#072b66;
    font-size:60px;
    margin-bottom:25px;
}

.program-desc{
    max-width:1100px;
    font-size:20px;
    line-height:1.8;
    margin-bottom:50px;
}

.program-cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
}

.card{
    background:#f2f2f2;
    padding:40px;
    transition:0.4s;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.icon{
    font-size:70px;
    color:#d9a000;
    margin-bottom:30px;
}

.card h2{
    color:#072b66;
    font-size:28px;
    margin-bottom:20px;
}

.card p{
    font-size:18px;
    line-height:1.8;
    color:#222;
    margin-bottom:25px;
}

.card a{
    text-decoration:none;
    color:#072b66;
    font-weight:bold;
    font-size:18px;
}

.card a:hover{
    color:#d9a000;
}

@media(max-width:992px){

.program-cards{
    grid-template-columns:1fr;
}

.main-title{
    font-size:40px;
}

.sub-title{
    font-size:24px;
}

}
.community-section{
    padding:80px 5%;
    background:#ffffff;
    text-align:center;
}

.small-heading{
    font-size:22px;
    font-weight:500;
    color:#111;
    margin-bottom:20px;
}

.main-heading{
    font-size:55px;
    font-weight:700;
    color:#d8a419;
    margin-bottom:50px;
}


    .banner1 {

      color:#ffffff;
      text-align: center;
      position: relative;
    }

    .banner h1 {
      margin: 0;
      font-size: 36px;
      color: #ffffff;
    }

    .banner h2 {
      margin: 10px 0 30px;
      font-size: 20px;
      color: #ffffff;
    }

   .alumni-container {
      display: flex;
      justify-content: center;
      gap: 20px;  
    }
    .alumni-card {
      background: #500454; /* brown panel */
      color: #fff;
      width: 260px;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      margin: 0 auto; /* centers the card */
    }

    .alumni-card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 25px;
    }

    .alumni-card h3 {
      margin: 10px 0 5px;
      font-size: 20px;
    }

    .alumni-card p {
      margin: 5px 0;
      font-size: 14px;
    }

  </style>
</head>
