<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Student Study Materials</title>

<style>
body{
    font-family:Arial;
    background:#f4f6f9;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
}

select,input,button{
    width:100%;
    padding:10px;
    margin-top:10px;
}

.file{
    margin-top:15px;
    padding:10px;
    border:1px solid #ddd;
}
a{color:green;}
</style>
</head>

<body>

<div class="container">

<h2>📚 Study Materials</h2>

<!-- SAME DEPARTMENT LIST -->
<select id="dept">

    <option value="BCOM-GENERAL">B.Com General</option>
    <option value="BCOM-BM">B.Com BM</option>
    <option value="BCOM-MM">B.Com MM</option>
    <option value="BCOM-CS">B.Com CS</option>
    <option value="BCOM-AF">B.Com A&F</option>
    <option value="BCOM-ISM">B.Com ISM</option>
    <option value="BCOM-CA">B.Com CA</option>
    <option value="BCOM-BUSAD">B.Com BUS.AD</option>

    <option value="BA-DEFENCE">B.A DEFENCE</option>
    <option value="BA-PUBAD">B.A PUB.AD</option>
    <option value="BA-TAMIL">B.A TAMIL</option>
    <option value="BA-TOURISM">B.A TOURISM</option>

    <option value="BSC-CS">B.Sc CS</option>
    <option value="BSC-CS-AI">B.Sc CS WITH AI</option>
    <option value="BSC-CRIMINOLOGY">B.Sc CRIMINOLOGY</option>
    <option value="BSC-SA">B.Sc SA</option>
    <option value="BSC-PHYS-CA">B.Sc PHYS WITH CA</option>
    <option value="BSC-MATHS-CA">B.Sc MATHS WITH CA</option>
    <option value="BSC-ELEC-AI">B.Sc ELECTRONICS WITH AI</option>
    <option value="BSC-VISCOM">B.Sc VISCOM</option>
    <option value="BSC-ELECTRONIC-MEDIA">B.Sc ELECTRONIC MEDIA</option>
    <option value="BSC-IDD">B.Sc IDD</option>
    <option value="BSC-PHYSICS">B.Sc PHYSICS</option>

    <option value="BCA">BCA COMPUTER APPLICATION</option>

</select>

<!-- SAME EXAM LIST -->
<select id="examType">

    <option value="CYCLIC-TEST-01">CYCLIC TEST 01</option>
    <option value="CYCLIC-TEST-02">CYCLIC TEST 02</option>

    <option value="INTERNAL-TEST-01">INTERNAL TEST 01</option>
    <option value="INTERNAL-TEST-02">INTERNAL TEST 02</option>

    <option value="MODEL-EXAM">MODEL EXAM</option>
    <option value="SEMESTER-EXAM">SEMESTER EXAM</option>

</select>

<input id="subject" placeholder="Enter Subject Name">

<button onclick="loadFiles()">View Materials</button>

<div id="result"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.loadFiles = async function(){

    const dept = document.getElementById("dept").value;
    const examType = document.getElementById("examType").value;
    const subject = document.getElementById("subject").value;

    const result = document.getElementById("result");
    result.innerHTML = "";

    const ref = doc(db,"studyMaterials",dept,examType,subject);
    const snap = await getDoc(ref);

    if(!snap.exists()){
        result.innerHTML = "<p>No materials found</p>";
        return;
    }

    const files = snap.data().files || [];

    files.forEach(f=>{
        result.innerHTML += `
        <div class="file">
            📄 ${f.name}
            <br>
            <a href="${f.url}" target="_blank" download>
                ⬇ Download
            </a>
        </div>
        `;
    });
};

</script>

</body>
</html>
