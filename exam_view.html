```html
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Exam Schedule View</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

h2{
    text-align:center;
}

select{
    width:100%;
    padding:8px;
    margin:6px 0;
}

.table-wrapper{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
    table-layout:fixed;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
    vertical-align:middle;
}

th{
    background:#f0f0f0;
}

th:nth-child(1), td:nth-child(1){width:15%;}
th:nth-child(2), td:nth-child(2){width:25%;}
th:nth-child(3), td:nth-child(3){width:15%;}
th:nth-child(4), td:nth-child(4){width:20%;}
th:nth-child(5), td:nth-child(5){width:25%;}

.attend-btn{
    background:#28a745;
    color:white;
    border:none;
    padding:8px 14px;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

.attend-btn:hover{
    background:#218838;
}
</style>
</head>

<body>

<div class="container">

<h2>Exam Schedule</h2>

<select id="dept" onchange="loadExam()">

    <option value="BCOM-GENERAL">B.Com General</option>
    <option value="BCOM-BM">B.Com BM</option>
    <option value="BCOM-MM">B.Com MM</option>
    <option value="BCOM-CS">B.Com CS</option>
    <option value="BCOM-AF">B.Com A&F</option>
    <option value="BCOM-ISM">B.Com ISM</option>
    <option value="BCOM-CA">B.Com CA</option>
    <option value="BCOM-BUSAD">B.Com BUS.AD</option>

    <option value="BA-DEFENCE">B.A DEFENCE</option>
    <option value="BA-PUBAD">B.A PUB.AD</option>
    <option value="BA-TAMIL">B.A TAMIL</option>
    <option value="BA-TOURISM">B.A TOURISM</option>

    <option value="BSC-CS">B.Sc CS</option>
    <option value="BSC-CS-AI">B.Sc CS WITH AI</option>
    <option value="BSC-CRIMINOLOGY">B.Sc CRIMINOLOGY</option>
    <option value="BSC-SA">B.Sc SA</option>
    <option value="BSC-PHYS-CA">B.Sc PHYS WITH CA</option>
    <option value="BSC-MATHS-CA">B.Sc MATHS WITH CA</option>
    <option value="BSC-ELEC-AI">B.Sc ELECTRONICS WITH AI</option>
    <option value="BSC-VISCOM">B.Sc VISCOM</option>
    <option value="BSC-ELECTRONIC-MEDIA">B.Sc ELECTRONIC MEDIA</option>
    <option value="BSC-IDD">B.Sc IDD</option>
    <option value="BSC-PHYSICS">B.Sc PHYSICS</option>

    <option value="BCA">BCA COMPUTER APPLICATION</option>

</select>

<select id="examType" onchange="loadExam()">

    <option value="CYCLIC-TEST-01">CYCLIC TEST 01</option>
    <option value="CYCLIC-TEST-02">CYCLIC TEST 02</option>

    <option value="INTERNAL-TEST-01">INTERNAL TEST 01</option>
    <option value="INTERNAL-TEST-02">INTERNAL TEST 02</option>

    <option value="MODEL-EXAM">MODEL EXAM</option>

    <option value="SEMESTER-EXAM">SEMESTER EXAM</option>

</select>

<div class="table-wrapper">

<table>
<thead>
<tr>
<th>Subject Code</th>
<th>Subject Name</th>
<th>Date</th>
<th>Timing</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

<script type="module">

import { db } from "./firebase-config.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

function formatDate(dateStr){

    if(!dateStr) return "";

    const d = new Date(dateStr);

    let day = String(d.getDate()).padStart(2,'0');
    let month = String(d.getMonth()+1).padStart(2,'0');
    let year = d.getFullYear();

    return `${day}.${month}.${year}`;
}

window.attendTest = function(link){

    if(!link){
        alert("Test Link Not Available");
        return;
    }

    window.open(link,"_blank");
};

window.loadExam = async function(){

    const dept = document.getElementById("dept").value;
    const examType = document.getElementById("examType").value;

    const snap = await getDoc(
        doc(db,"exams",dept,examType,"schedule")
    );

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    if(!snap.exists()){

        tbody.innerHTML = `
        <tr>
            <td colspan="5">No Exam Schedule Found</td>
        </tr>
        `;
        return;
    }

    const data = snap.data();

    for(let key in data){

        let d = data[key];

        tbody.innerHTML += `
        <tr>
            <td>${d.SubjectCode || ""}</td>
            <td>${d.SubjectName || ""}</td>
            <td>${formatDate(d.Date)}</td>
            <td>${d.Timing || ""}</td>
            
        </tr>
        `;
    }
};

loadExam();

</script>

</body>
</html>
